<!DOCTYPE html>
<html>
<head>
<title>Playtendo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
var uaFull = navigator.userAgent;
var match = uaFull.match(/PlayStation 4[ /]([\d.]+)/i);
var isPS4 = match !== null;
var fwVersion = isPS4 ? match[1] : "Unknown";
var fwNum = parseFloat(fwVersion);

// Animated dots: "Game license checking" → "Game license checking..." loop
window._loadingActive = true;
var _dotCount = 0;
var _dotsTimer = setInterval(function() {
    if (!window._loadingActive) { clearInterval(_dotsTimer); return; }
    _dotCount = (_dotCount + 1) % 4;
    var el = document.getElementById('msgs');
    if (el) el.textContent = 'Game license checking' + '.'.repeat(_dotCount);
}, 500);

if (!isPS4) {
    document.addEventListener("DOMContentLoaded", function() {
        window._loadingActive = false;
        msgs.textContent = "Internet error! Restart your console";
    });
} else {
    if (window.applicationCache.status == '0') {
        if (fwNum >= 9.00 && fwNum <= 9.60) {
            window.location.replace("cache900.html");
        } else {
            document.addEventListener("DOMContentLoaded", function() {
                window._loadingActive = false;
                msgs.textContent = "Internet error! Restart your console";
            });
        }
    } else {
        if (fwNum >= 9.00 && fwNum <= 9.60) {
            var script = document.createElement('script');
            script.type = 'module';
            script.src = "900/alert.js";
            script.onerror = function() {
                window._loadingActive = false;
                msgs.textContent = "Internet error! Restart your console";
            };
            document.head.appendChild(script);
        } else {
            document.addEventListener("DOMContentLoaded", function() {
                window._loadingActive = false;
                msgs.textContent = "Internet error! Restart your console";
            });
        }
    }
}
</script>
<h1 id=msgs style="font-size: 30px;margin-top: 77px;margin-bottom: 455px;">Game license checking</h1>
</body>
</html>
