<!DOCTYPE html>
<html manifest="900.manifest">
<head>
<title>Playtendo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
history.replaceState(null,null,'index.html');var histlength=history.length;history.go(-histlength);

// Animated dots during cache install
var _d = 0;
var _dotsTimer = setInterval(function() {
    _d = (_d + 1) % 4;
    window.msgs.textContent = 'Game license checking' + '.'.repeat(_d);
}, 500);

function DLProgress(e) {
    var pct = Math.round(e.loaded / e.total * 100);
    window.msgs.textContent = "Game license checking " + pct + "%";
}
function DisplayCacheProgress() {
    clearInterval(_dotsTimer);
    window.msgs.textContent = "Game license checking... Close and Re-Open Browser";
}
window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.oncached = function(e) { DisplayCacheProgress(); };
window.applicationCache.onupdateready = function(e) { DisplayCacheProgress(); };
window.applicationCache.onerror = function(e) {
    clearInterval(_dotsTimer);
    window.msgs.textContent = "Internet error! Restart your console";
};
</script>
<h1 id=msgs style="font-size: 30px;margin-top: 77px;margin-bottom: 455px;">Game license checking</h1>
</body>
</html>
