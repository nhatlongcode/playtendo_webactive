<!DOCTYPE html>
<html>
<head>
<title>Playtendo - Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    background-color: #24272b;
    background-image: url('img.jpg');
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
    font-family: sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

#msgs {
    text-shadow: 0.1em 0.1em 0.2em black;
    font-size: 30px;
    color: white;
    margin-top: 77px;
    display: block;
}
#msgs.success { color: #00e676; }
#msgs.error   { color: #ff1744; }

/* ── Demo control panel ── */
#demo-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.88);
    border-top: 1px solid #444;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 999;
    font-size: 13px;
}

#demo-panel label { color: #aaa; }

#demo-panel select, #demo-panel button {
    background: #003263;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 7px 13px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
}
#demo-panel select:hover, #demo-panel button:hover { background: #0069d9; }
#demo-panel button.green { background: #1b5e20; }
#demo-panel button.green:hover { background: #2e7d32; }
#demo-panel button.red { background: #7f0000; }
#demo-panel button.red:hover { background: #b71c1c; }
#demo-panel button.gray { background: #333; }
#demo-panel button.gray:hover { background: #555; }
.sep { width: 1px; height: 26px; background: #444; margin: 0 2px; }

#stage-label {
    font-size: 11px;
    color: #666;
    position: fixed;
    bottom: 52px;
    right: 12px;
    pointer-events: none;
}

/* Progress bar (cache phase) */
#progress-bar-wrap {
    display: none;
    margin-top: 18px;
}
#progress-bar-bg {
    width: 340px;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin: 0 auto;
    overflow: hidden;
}
#progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #0069d9;
    border-radius: 3px;
    transition: width 0.3s linear;
}
</style>
</head>
<body>

<h1 id="msgs">Game license checking</h1>
<div id="progress-bar-wrap">
    <div id="progress-bar-bg">
        <div id="progress-bar-fill"></div>
    </div>
</div>

<div id="stage-label">Stage: —</div>

<div id="demo-panel">
    <label>Visit:</label>
    <select id="visit-select">
        <option value="first">Lần đầu (install cache)</option>
        <option value="second">Lần sau (chạy exploit)</option>
    </select>

    <label>FW:</label>
    <select id="fw-select">
        <option value="900">9.00</option>
        <option value="960">9.60</option>
    </select>

    <div class="sep"></div>

    <button class="green" onclick="runDemo('success')">▶ Chạy</button>
    <button class="red"   onclick="runDemo('fail')">✕ Lỗi</button>
    <button class="gray"  onclick="resetDemo()">↺ Reset</button>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────
var _loadingActive = false;
var _dotsTimer = null;
var _dotCount = 0;
var _running = false;

function startDots(baseText) {
    baseText = baseText || 'Game license checking';
    _loadingActive = true;
    _dotCount = 0;
    clearInterval(_dotsTimer);
    _dotsTimer = setInterval(function() {
        if (!_loadingActive) { clearInterval(_dotsTimer); return; }
        _dotCount = (_dotCount + 1) % 4;
        setMsg(baseText + '.'.repeat(_dotCount), '');
    }, 500);
}

function stopDots() {
    _loadingActive = false;
    clearInterval(_dotsTimer);
}

function setMsg(text, cls) {
    var el = document.getElementById('msgs');
    el.textContent = text;
    el.className = cls || '';
}

function setStage(s) {
    document.getElementById('stage-label').textContent = 'Stage: ' + s;
}

function setProgress(pct) {
    document.getElementById('progress-bar-fill').style.width = pct + '%';
}

function showBar(show) {
    document.getElementById('progress-bar-wrap').style.display = show ? 'block' : 'none';
}

function wait(ms) {
    return new Promise(function(r) { setTimeout(r, ms); });
}

// ── Animate progress bar from 0 → 100 over `ms` ms ──────────────
async function animateProgress(ms) {
    var steps = 30;
    var interval = ms / steps;
    for (var i = 1; i <= steps; i++) {
        setProgress(Math.round((i / steps) * 100));
        // slow down near the end to feel realistic
        var delay = i < steps * 0.7 ? interval * 0.7 : interval * 1.6;
        await wait(delay);
    }
}

// ── FLOW: First visit — install cache ────────────────────────────
async function flowFirstVisit(outcome) {
    setStage('Redirecting to cache900.html');
    startDots();
    await wait(800);

    // Start cache download
    setStage('Downloading cache');
    showBar(true);
    setProgress(0);
    stopDots();

    if (outcome === 'fail') {
        await wait(600);
        setMsg('Internet error! Restart your console', 'error');
        showBar(false);
        setStage('Cache error');
        return;
    }

    // Animate download progress — show % in text
    var steps = 20;
    var totalMs = 3000;
    var interval = totalMs / steps;
    for (var i = 1; i <= steps; i++) {
        var pct = Math.round((i / steps) * 100);
        setProgress(pct);
        setMsg('Game license checking ' + pct + '%', '');
        var delay = i < steps * 0.6 ? interval * 0.7 : interval * 1.5;
        await wait(delay);
    }

    // Cache done
    showBar(false);
    setStage('Cache installed ✓');
    setMsg('Game license checking... Close and Re-Open Browser', '');
}

// ── FLOW: Second visit — run exploit ─────────────────────────────
async function flowSecondVisit(outcome) {
    var fw = document.getElementById('fw-select').value;

    // Phase 1: WebKit exploit (PSFree) — user sees dots
    setStage('WebKit exploit (PSFree)');
    startDots();
    await wait(2200);

    if (outcome === 'fail') {
        stopDots();
        setStage('Failed');
        setMsg('Internet error! Restart your console', 'error');
        return;
    }

    // Phase 2: Kernel exploit (Lapse)
    setStage('Kernel exploit (Lapse)');
    await wait(3000);

    // Phase 3: disable-updates — chỉ FW 9.00
    if (fw === '900') {
        setStage('disable-updates.bin');
        await wait(1200);
    }

    // Phase 4: GoldHEN
    setStage('GoldHEN v2.4b18.10');
    await wait(1200);

    // Done
    stopDots();
    setStage('Done ✓');
    setMsg('Game license OK! Account: Playtendovietnam@gmail.com', 'success');
}

// ── Entry point ───────────────────────────────────────────────────
async function runDemo(outcome) {
    if (_running) return;
    _running = true;

    var visit = document.getElementById('visit-select').value;

    if (visit === 'first') {
        await flowFirstVisit(outcome);
    } else {
        await flowSecondVisit(outcome);
    }

    _running = false;
}

function resetDemo() {
    _running = false;
    stopDots();
    showBar(false);
    setProgress(0);
    setStage('—');
    setMsg('Game license checking', '');
}

// Init
startDots();
setStage('Detecting console...');
</script>
</body>
</html>
